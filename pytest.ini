[pytest]
# 1. Terminal Output Configuration
# -v: Verbose (show detailed test results)
# -s: Disable output capturing (print statements will show in terminal)
addopts = -v -s --junitxml=logs/test_report.xml --log-file=logs/integration_test.log

# 2. Log Formatting Configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging specific configuration
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

# 3. Test Discovery (Where should pytest look for tests)
testpaths =
    tests/integration
    tests/unit